    <div class="lightbox-backdrop" data-close-lightbox></div>
    <button class="lightbox-close" id="lightboxClose" type="button" aria-label="Закрыть" data-close-lightbox>&times;</button>
    <div class="lightbox-frame">
      <button class="lightbox-prev" id="lightboxPrev" type="button" aria-label="Предыдущее изображение">&#8249;</button>
      <img class="lightbox-image" id="lightboxImage" src="" alt="">
      <button class="lightbox-next" id="lightboxNext" type="button" aria-label="Следующее изображение">&#8250;</button>
    </div>
  </div>

  <button class="scroll-top" id="scrollTopButton" type="button" aria-label="Наверх">&#8593;</button>
  <button class="floating-back" id="floatingBackButton" type="button" aria-label="Назад">&#8592;</button>

  <script>
    (() => {
      const coverTrigger = document.getElementById("coverTrigger");
      const streamTriggers = Array.from(document.querySelectorAll(".stream-shot[data-lightbox-source]"));
      const lightbox = document.getElementById("lightbox");
      const lightboxFrame = lightbox.querySelector(".lightbox-frame");
      const image = document.getElementById("lightboxImage");
      const prev = document.getElementById("lightboxPrev");
      const next = document.getElementById("lightboxNext");
      const streamItems = streamTriggers.map((trigger) => trigger.dataset.lightboxSource);
      let galleryItems = [];
      let currentIndex = 0;

      const syncNav = () => {
        const visible = lightbox.classList.contains("open") && galleryItems.length > 1;
        prev.style.display = visible ? "flex" : "none";
        next.style.display = visible ? "flex" : "none";
      };

      const openGallery = (items, index = 0) => {
        galleryItems = items;
        currentIndex = index;
        image.src = galleryItems[currentIndex];
        lightbox.classList.add("open");
        lightbox.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
        syncNav();
      };

      const closeGallery = () => {
        lightbox.classList.remove("open");
        lightbox.setAttribute("aria-hidden", "true");
        image.src = "";
        galleryItems = [];
        document.body.style.overflow = "";
        syncNav();
      };

      const step = (delta) => {
        if (!lightbox.classList.contains("open") || galleryItems.length < 2) return;
        currentIndex = (currentIndex + delta + galleryItems.length) % galleryItems.length;
        image.src = galleryItems[currentIndex];
      };

      coverTrigger.addEventListener("click", () => {
        openGallery([coverTrigger.dataset.lightboxSource], 0);
      });

      streamTriggers.forEach((trigger, index) => {
        trigger.addEventListener("click", () => {
          openGallery(streamItems, index);
        });
      });

      prev.addEventListener("click", () => step(-1));
      next.addEventListener("click", () => step(1));

      lightbox.querySelectorAll("[data-close-lightbox]").forEach((node) => {
        node.addEventListener("click", closeGallery);
      });

      lightbox.addEventListener("click", (event) => {
        if (event.target === lightbox || event.target === lightboxFrame) closeGallery();
      });

      window.addEventListener("keydown", (event) => {
        if (!lightbox.classList.contains("open")) return;
        if (event.key === "Escape") closeGallery();
        if (event.key === "ArrowLeft") step(-1);
        if (event.key === "ArrowRight") step(1);
      });
    })();

    (() => {
      const desktopCard = document.querySelector(".stream-shot:first-child");
      const mobileCard = document.querySelector(".stream-shot:last-child");
      if (!desktopCard || !mobileCard) return;

      const syncPairHeight = () => {
        mobileCard.style.height = "";
        desktopCard.style.height = "";
        if (window.innerWidth <= 560) {
          const mobileHeight = mobileCard.getBoundingClientRect().height;
          if (mobileHeight > 0) {
            desktopCard.style.height = `${Math.round(mobileHeight)}px`;
          }
          return;
        }
        const height = desktopCard.getBoundingClientRect().height;
        if (height > 0) {
          mobileCard.style.height = `${Math.round(height)}px`;
        }
      };

      window.addEventListener("load", syncPairHeight);
      window.addEventListener("resize", syncPairHeight);
      syncPairHeight();
    })();

    (() => {
      const button = document.getElementById("scrollTopButton");
      const backButton = document.getElementById("floatingBackButton");
      if (!button) return;

      const toggleButton = () => {
        const isVisible = window.scrollY > 320;
        button.classList.toggle("visible", isVisible);
        if (backButton) backButton.classList.toggle("visible", isVisible);
      };

      window.addEventListener("scroll", toggleButton, { passive: true });
      toggleButton();

      button.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      if (backButton) {
        backButton.addEventListener("click", () => {
          window.location.href = "../index.html";
        });
      }
    })();
  </script>

  <script>
    (() => {
      const pageNavLinks = Array.from(document.querySelectorAll('.page-nav a[href^="#"]'));
      if (!pageNavLinks.length) return;

      const cleanUrl = window.location.pathname + window.location.search;

      pageNavLinks.forEach((link) => {
        const targetSelector = link.getAttribute('href');
        if (!targetSelector || targetSelector === '#') return;

        link.dataset.target = targetSelector;
        link.setAttribute('href', cleanUrl);

        link.addEventListener('click', (event) => {
          const target = document.querySelector(link.dataset.target);
          if (!target) return;

          event.preventDefault();
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });

          if (window.history && typeof window.history.replaceState === 'function') {
            window.history.replaceState(window.history.state, '', cleanUrl);
          }
        });
      });
    })();
  </script>

  <script>
    (() => {
      const projects = [
        { file: "project-01.html", title: "Внешние коммуникации" },
        { file: "project-02.html", title: "Внутренние коммуникации" },
        { file: "project-03.html", title: "Бренд- и спецпроекты" },
        { file: "project-04.html", title: "Полиграфия" },
        { file: "project-07.html", title: "Lashes Beauty" },
        { file: "project-05.html", title: "Щёлочь" },
        { file: "project-06.html", title: "Любовь эмигранта" }
      ];
      const switcher = document.getElementById("projectSwitcher");
      if (!switcher) return;
      const currentFile = window.location.pathname.split("/").pop();
      const currentIndex = projects.findIndex((project) => project.file === currentFile);
      if (currentIndex === -1) return;
      const prevProject = projects[(currentIndex - 1 + projects.length) % projects.length];
      const nextProject = projects[(currentIndex + 1) % projects.length];
      switcher.innerHTML = `
        <a class="project-switcher-link" href="${prevProject.file}">
          <span class="project-switcher-label">Предыдущий проект</span>
          <span class="project-switcher-title">${prevProject.title}</span>
        </a>
        <a class="project-switcher-link" href="${nextProject.file}">
          <span class="project-switcher-label">Следующий проект</span>
          <span class="project-switcher-title">${nextProject.title}</span>
        </a>
      `;
    })();
  </script>

  <script>
    (() => {
      const revealPage = () => document.documentElement.classList.remove("fonts-loading");
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(revealPage).catch(revealPage);
      } else {
        revealPage();
      }
    })();
  </script>
</body>
</html>
